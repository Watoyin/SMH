<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Urgent Update</title>
<style>
body{background:#121212;color:#fff;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box}
#adventure-container{width:100%;max-width:450px}.step-card{text-align:center;background:#1e1e1e;padding:30px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hidden{display:none}button{display:block;width:100%;margin:12px 0;padding:14px;background:#ff4757;color:#fff;border:0;border-radius:6px;font-weight:bold}
textarea{width:100%;height:100px;background:#2d2d2d;color:#fff;border:1px solid #444;border-radius:6px;padding:10px;box-sizing:border-box}
</style></head><body>
<div id="adventure-container">
<section id="home" class="step-card">
<h2>Why have you been ignoring me?</h2>
<button onclick="show('bear')">A) Fought a bear</button>
<button onclick="show('well')">B) Trapped in a well</button>
<button onclick="show('forgot')">C) Forgot how to text</button>
<button onclick="prefill(`I don't like you`)">D) I don't like you</button>
<button onclick="show('village')">E) My village people were active</button>
</section>
<section id="bear" class="step-card hidden"><h2>Impressive. Did you win?</h2>
<button onclick="show('tutorial')">Yes, but my phone broke.</button>
<button onclick="show('well')">No, the bear stole my phone.</button></section>
<section id="well" class="step-card hidden"><h2>So how did you get out?</h2><textarea placeholder="An aunty with plenty advice rescued me..."></textarea><button onclick="show('tutorial')">Continue</button></section>
<section id="forgot" class="step-card hidden"><h2>Have you remembered now?</h2>
<button onclick="show('tutorial')">My keyboard was fasting.</button>
<button onclick="show('tutorial')">MTN was against me.</button>
<button onclick="show('tutorial')">Airtel betrayed me.</button>
<button onclick="prefill('Stop messaging me')">Stop messaging me</button></section>
<section id="village" class="step-card hidden"><h2>My village people were active.</h2>
<button onclick="show('tutorial')">They appeared in my dreams.</button>
<button onclick="show('tutorial')">My network disappeared immediately.</button>
<button onclick="show('tutorial')">My charger stopped working.</button>
<button onclick="show('tutorial')">They've asked me not to discuss it.</button></section>
<section id="tutorial" class="step-card hidden"><h2>The Excuse Committee has reviewed your case.</h2><p id="roast"></p><textarea id="reply"></textarea><button onclick="send()">Launch Response</button></section>
</div>
<script>
const phoneNumber="07035684216";
const roasts=["Even JAMB released results before you replied.","Abeg, just reply.","Your blue ticks deserve prison.","Even Nigerian banks send OTPs faster.","If excuses were airtime, you'd have unlimited data."];
function show(id){document.querySelectorAll('.step-card').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');if(id==='tutorial'){document.getElementById('roast').textContent=roasts[Math.floor(Math.random()*roasts.length)];}}
function prefill(t){document.getElementById('reply').value=t;show('tutorial');}
function send(){const t=document.getElementById('reply').value.trim();if(!t){alert('Please type a response first!');return;}location.href='https://wa.me/'+phoneNumber+'?text='+encodeURIComponent(t);}
</script></body></html>
