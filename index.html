<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Excuse Generator</title><style>
body{background:#121212;color:#fff;font-family:Courier New,monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;padding:20px}#adventure-container{max-width:460px;width:100%}.step-card{background:#1e1e1e;padding:28px;border-radius:12px;text-align:center}.hidden{display:none}button{display:block;width:100%;margin:10px 0;padding:14px;background:#ff4757;color:#fff;border:0;border-radius:6px;font-weight:bold}textarea{width:100%;height:100px;background:#2d2d2d;color:#fff;border:1px solid #444;border-radius:6px;padding:10px;box-sizing:border-box}
</style></head><body><div id="adventure-container">
<section id="step-1" class="step-card"><h2>Why have you been ignoring me?</h2><button onclick="goToStep(2)">A) Fought a bear</button><button onclick="goToStep('well')">B) Trapped in a well</button><button onclick="goToStep('forgot')">C) Forgot how to text</button><button onclick="setDirectReply(`I don't like you`)">D) I don't like you</button><button onclick="goToStep('village')">E) My village people were active</button></section>
<section id="step-2" class="step-card hidden"><h2>Impressive. Did you win?</h2><button onclick="goToStep('tutorial')">Yes, but my phone broke</button><button onclick="goToStep('well')">No, the bear stole my phone</button></section>
<section id="well" class="step-card hidden"><h2>So how did you get out?</h2><textarea placeholder="An aunty with plenty advice rescued me..."></textarea><button onclick="goToStep('tutorial')">Continue</button></section>
<section id="forgot" class="step-card hidden"><h2>Have you remembered now?</h2><button onclick="goToStep('tutorial')">My keyboard was fasting.</button><button onclick="goToStep('tutorial')">MTN was against me.</button><button onclick="goToStep('tutorial')">Airtel betrayed me.</button><button onclick="setDirectReply('Stop messaging me')">Stop messaging me.</button></section>
<section id="village" class="step-card hidden"><h2>My village people were active.</h2><p>How serious was the attack?</p><button onclick="goToStep('tutorial')">They appeared in my dreams.</button><button onclick="goToStep('tutorial')">My network disappeared immediately.</button><button onclick="goToStep('tutorial')">My charger stopped working for no reason.</button><button onclick="goToStep('tutorial')">They've asked me not to discuss it.</button></section>
<section id="tutorial" class="step-card hidden"><h2>The Excuse Committee has reviewed your case.</h2><p id="roast"></p><textarea id="reply-box" placeholder="Hey, sorry I was being a ghost..."></textarea><button onclick="sendText()">Launch Response</button></section>
</div><script>
const roasts=["Even JAMB released results before you replied.","Your blue ticks deserve prison.","Even Nigerian banks send OTPs faster.","Abeg, just reply.","If excuses were airtime, you'd have unlimited data."];
function goToStep(id){document.querySelectorAll('.step-card').forEach(x=>x.classList.add('hidden'));document.getElementById(id===2?'step-2':id).classList.remove('hidden');if(id==='tutorial'){roast.innerText=roasts[Math.floor(Math.random()*roasts.length)];}}
function setDirectReply(t){reply-box.value=t;goToStep('tutorial');}
function sendText(){let t=reply-box.value.trim();if(!t){alert('Please type a response first!');return;}window.open('https://wa.me/07035684216?text='+encodeURIComponent(t),'_blank');}
</script></body></html>
